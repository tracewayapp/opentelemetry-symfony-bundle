name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

  tests:
    name: PHP ${{ matrix.php }} / Symfony ${{ matrix.symfony }} / DBAL ${{ matrix.dbal }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            symfony: '6.4.*'
            dbal: '^4.0'
            coverage: false
          - php: '8.2'
            symfony: '7.4.*'
            dbal: '^4.0'
            coverage: true
          - php: '8.2'
            symfony: '7.4.*'
            dbal: '^3.6'
            coverage: false
          - php: '8.4'
            symfony: '8.0.*'
            dbal: '^4.0'
            coverage: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: ${{ matrix.coverage && 'xdebug' || 'none' }}

      - name: Restrict Symfony version
        run: |
          composer require --no-update symfony/config:${{ matrix.symfony }}
          composer require --no-update symfony/dependency-injection:${{ matrix.symfony }}
          composer require --no-update symfony/event-dispatcher:${{ matrix.symfony }}
          composer require --no-update symfony/http-foundation:${{ matrix.symfony }}
          composer require --no-update symfony/http-kernel:${{ matrix.symfony }}
          composer require --no-update symfony/yaml:${{ matrix.symfony }}

      - name: Restrict DBAL version
        run: composer require --no-update --dev doctrine/dbal:${{ matrix.dbal }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        if: ${{ !matrix.coverage }}
        run: vendor/bin/phpunit

      - name: Run PHPUnit with coverage
        if: ${{ matrix.coverage }}
        run: vendor/bin/phpunit --coverage-clover coverage.xml

      - name: Upload coverage to Codecov
        if: ${{ matrix.coverage }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
